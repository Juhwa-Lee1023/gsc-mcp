name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Built CLI help smoke test
        run: node dist/index.js --help

      - name: Built CLI auth smoke test
        run: |
          mkdir -p .tmp/ci-smoke
          GSC_MCP_DATA_DIR=.tmp/ci-smoke node dist/index.js auth status

      - name: Built CLI runtime smoke test
        run: pnpm runtime:smoke

      - name: Package dry-run validation
        run: pnpm pack:check
